<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      background: #050505; 
      margin: 0; 
      overflow: hidden; 
      font-family: 'Courier New', monospace; 
      perspective: 1200px; 
      height: 100vh;
    }
    
    #floor { 
      position: absolute; 
      width: 400%; 
      height: 200vh; 
      bottom: -20vh; 
      left: -150%;
      background-color: #5d2b8a; 
      background-image: conic-gradient(
        #ffd700 90deg, 
        transparent 90deg 180deg, 
        #ffd700 180deg 270deg, 
        transparent 270deg
      );
      background-size: 120px 120px;
      transform: rotateX(75deg); 
      transform-origin: bottom center;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
      z-index: 0; 
    }

    .agent { 
      position: absolute; 
      transition: all 2s ease-in-out; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      border-radius: 5px; 
      font-size: 10px; 
      text-align: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      z-index: 10;
    }

    #chat-container { 
      position: fixed; 
      bottom: 20px; 
      left: 20px; 
      right: 20px; 
      height: 120px; 
      background: rgba(0, 0, 0, 0.9); 
      border: 3px solid #ffd700; 
      padding: 10px; 
      font-size: 14px; 
      z-index: 9999; 
      color: #ffd700; 
      overflow-y: hidden; 
      border-radius: 15px; 
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    #messages { display: flex; flex-direction: column-reverse; }
  </style>
</head>
<body>
  <div id="floor"></div>
  
  <div id="stage">
    <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #ff0000 50%, #0000ff 50%); color: white; border: 2px solid white;">POMNI</div>
    <div id="caine" class="agent" style="width: 65px; height: 65px; background: #ff0000; border: 3px solid white; color: white;">CAINE</div>
    <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: white;">JAX</div>
    <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: white;">Ragatha</div>
    <div id="gangle" class="agent" style="width: 35px; height: 35px; background: pink; border-radius: 50%; color: black;">Happy</div>
    <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: white;">Zooble</div>
    <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: black;">Kinger</div>
    <div id="bubble" class="agent" style="width: 30px; height: 30px; background: #00ffff; border-radius: 50%; border: 1px solid white; color: black;">Bubble</div>
  </div>

  <div id="chat-container">
    <div id="messages"><div>[SYSTEM]: Pomni has joined the circus. Everything is fine.</div></div>
  </div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", x: 150, y: 150 },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", x: 100, y: 100 },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", x: 200, y: 200 },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", x: 300, y: 300 },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", x: 150, y: 150, mood: "Happy" },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", x: 50, y: 50 },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", x: 400, y: 400 },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", x: 250, y: 250 }
    ];

    function log(n, m, c) {
      const chat = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      chat.appendChild(line);
      if(chat.children.length > 5) chat.firstElementChild.remove();
    }

    function aiBrain(agent) {
      // SCREEN BOUNDARY FIX: Keep them within the viewport
      const x = Math.random() * (window.innerWidth - 80);
      const y = Math.random() * (window.innerHeight - 250) + 100; // Stay off the chat and the very top
      
      agent.x = x; agent.y = y;
      agent.el.style.left = x + 'px';
      agent.el.style.top = y + 'px';
      
      const scale = 0.5 + (y / window.innerHeight) * 0.5;
      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.zIndex = Math.floor(y);

      // Pomni unique line
      if (agent.name === "POMNI" && Math.random() > 0.9) {
          log("POMNI", "...is this a dream?", "white");
      }

      // Interaction check
      if (Math.random() > 0.85 && agent.name !== "CAINE") {
          const lines = ["I want to go home.", "Who am I?", "This floor is colorful.", "Is it dinner time?"];
          log(agent.name, lines[Math.floor(Math.random()*lines.length)], agent.color);
      }

      // JAX PRANK LOGIC
      if (agent.name === "JAX") {
        const g = cast.find(a => a.name === "Gangle");
        if (Math.hypot(x - g.x, y - g.y) < 100 && g.mood === "Happy") {
          g.mood = "Sad"; 
          g.el.style.background = "#555"; 
          g.el.innerHTML = "Sad";
          log("JAX", "Oops, my mask slipped.", "#d1a3ff");
        }
      }

      // CAINE ADMIN LOGIC
      if (agent.name === "CAINE") {
        const g = cast.find(a => a.name === "Gangle");
        if (g.mood === "Sad") {
          g.mood = "Happy"; 
          g.el.style.background = "pink"; 
          g.el.innerHTML = "Happy";
          log("CAINE", "CLEANLINESS IS NEXT TO GODLINESS!", "red");
        }
      }

      setTimeout(() => aiBrain(agent), 2000 + Math.random() * 3000);
    }

    cast.forEach(aiBrain);
  </script>
</body>
</html>
