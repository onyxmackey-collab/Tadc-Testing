<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #circus-container { position: relative; width: 100%; height: 100%; overflow: hidden; }

    #tent-wall {
      position: absolute; top: 0; left: 0; width: 100%; height: 60%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 10px solid #000; z-index: 10; overflow: hidden;
    }

    #floor { 
      position: absolute; width: 150%; height: 100%; top: 59%; left: -25%;
      background-color: #fff;
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 80px 80px; transform: perspective(800px) rotateX(70deg); transform-origin: top center; z-index: 5;
    }

    .agent { 
      position: absolute; transition: left 2.5s ease-in-out, top 2.5s ease-in-out; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: bold; font-size: 10px; text-align: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center; 
      z-index: 1000; 
    }

    /* BUBBLE SPECIFIC STYLE */
    #bubble { 
      background: radial-gradient(circle at 30% 30%, white, rgba(255,255,255,0.2) 20%, rgba(0,255,255,0.4) 60%, rgba(0,255,255,0.8));
      border: 1px solid white; box-shadow: inset -5px -5px 10px rgba(255,255,255,0.5), 0 0 15px cyan;
      transition: left 0.5s linear, top 0.5s linear; /* Fast follow */
      border-radius: 50% !important;
    }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -15px; } }
    .walking { animation: walkBob 0.4s infinite; }
    
    /* CAINE SPECIFIC ANIMATION */
    @keyframes hoverFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
    .hovering-wrap { animation: hoverFloat 2s ease-in-out infinite; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

    #chat-container { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 120px; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffd700; padding: 10px; z-index: 9999; border-radius: 15px; overflow: hidden; pointer-events: none; }
    #messages { display: flex; flex-direction: column-reverse; color: #ffd700; font-size: 13px; }
  </style>
</head>
<body>
  <div id="circus-container">
    <div id="tent-wall"></div>
    <div id="floor"></div>
    <div id="stage">
      <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #f00 50%, #00f 50%); color: #fff; border: 2px solid #fff; border-radius: 5px;">POMNI</div>
      
      <!-- CAINE: Floating and leading -->
      <div id="caine" class="agent" style="width: 65px; height: 65px; background: #f00; border: 3px solid #fff; color: #fff; border-radius: 5px;"><div class="hovering-wrap">CAINE</div></div>
      
      <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: #fff; border-radius: 5px;">JAX</div>
      <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: #fff; border-radius: 5px;">Ragatha</div>
      <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: #000;">GANGLE</div>
      <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: #fff; border-radius: 5px;">Zooble</div>
      <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: #000; border-radius: 5px;">Kinger</div>
      
      <!-- BUBBLE: Round and following -->
      <div id="bubble" class="agent" style="width: 35px; height: 35px; color: #000;">Bubble</div>
    </div>
  </div>
  <div id="chat-container"><div id="messages"></div></div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", lines: ["Is there an exit?", "I don't belong here!"] },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", lines: ["WELCOME!", "ADVENTURE AWAITS!"] },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", lines: ["Whatever, dollface.", "I'm bored."] },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", lines: ["Stay calm!", "Everything is fine."] },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", lines: ["My mask...", "I'm sad."] },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", lines: ["Leave me alone.", "I hate this."] },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", lines: ["INSECTS?!", "AH! A STRANGER!"] },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", lines: ["YUM SOAP!", "POP!"] }
    ];

    function log(n, m, c) {
      const msgs = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      msgs.prepend(line);
      if(msgs.children.length > 5) msgs.lastElementChild.remove();
    }

    function socialEngine() {
      const char = cast[Math.floor(Math.random() * cast.length)];
      log(char.name, char.lines[Math.floor(Math.random() * char.lines.length)], char.color);
      setTimeout(socialEngine, 5000 + Math.random() * 5000);
    }

    let cainePos = { x: window.innerWidth / 2, y: window.innerHeight * 0.7 };

    function aiBrain(agent) {
      const move = () => {
        if (agent.name === "Bubble") {
          // Bubble constantly sticks to Caine
          const nextX = cainePos.x - 60;
          const nextY = cainePos.y - 10;
          agent.el.style.left = nextX + 'px';
          agent.el.style.top = nextY + 'px';
          setTimeout(move, 100); 
          return;
        }

        const nextX = 100 + Math.random() * (window.innerWidth - 200);
        const nextY = (window.innerHeight * 0.65) + Math.random() * (window.innerHeight * 0.20); 
        
        if (agent.name === "CAINE") {
          cainePos = { x: nextX, y: nextY };
        } else {
          agent.el.classList.add('walking');
        }

        const scale = 0.8 + ((nextY / window.innerHeight) * 0.2);
        agent.el.style.transform = `scale(${scale})`;
        agent.el.style.left = nextX + 'px';
        agent.el.style.top = nextY + 'px';

        setTimeout(() => { agent.el.classList.remove('walking'); }, 2500);
        setTimeout(move, 4000 + Math.random() * 4000);
      };
      move();
    }

    window.onload = () => {
      cast.forEach(agent => {
        agent.el.style.left = '50vw';
        agent.el.style.top = '75vh';
        aiBrain(agent);
      });
      socialEngine();
    };
  </script>
</body>
</html>
