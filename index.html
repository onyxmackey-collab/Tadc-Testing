<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    body { font-family: 'Courier New', monospace; perspective: 1200px; }
    
    #tent-wall {
      position: absolute; top: 0; left: 0; width: 100%; height: 65%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 8px solid #000; z-index: -10; overflow: hidden;
    }

    .center-pole { position: absolute; left: 50%; top: 0; width: 12px; height: 100%; background: #222; transform: translateX(-50%); }
    .spiral { position: absolute; left: 50%; width: 50px; height: 100%; background: repeating-linear-gradient(transparent, transparent 20px, #f00 20px, #f00 40px); transform: translateX(-50%) skewY(-15deg); opacity: 0.7; }

    /* DECORATIONS */
    .deco-hoop { position: absolute; border: 15px solid #0f0; border-radius: 50%; z-index: -5; }
    .huge-hoop-left { left: 5%; top: 38%; width: 180px; height: 180px; border-width: 22px; }
    .mid-hoop-right { right: 18%; top: 22%; width: 70px; height: 70px; border-width: 12px; }
    .small-hoop-right { right: 10%; top: 50%; width: 50px; height: 50px; border-width: 10px; }
    .zipper-halo { left: 50%; top: 30%; width: 120px; height: 35px; border-width: 10px; transform: translateX(-50%) rotateX(75deg); }
    .giant-star { position: absolute; top: 100px; right: 15%; width: 85px; height: 85px; background: #ff0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); border: 5px solid #000; }
    .sky-portal { position: absolute; width: 130px; height: 130px; background: radial-gradient(circle, #fff, #87ceeb); border-radius: 50%; top: 35px; left: 8%; border: 8px solid #4a148c; }

    #floor { 
      position: absolute; width: 400%; height: 150vh; bottom: -10vh; left: -150%;
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 100px 100px; transform: rotateX(72deg); transform-origin: bottom center;
      box-shadow: inset 0 0 200px rgba(0,0,0,1); z-index: -1; 
    }

    .agent { position: absolute; transition: left 2.5s ease-in-out, top 2.5s ease-in-out, transform 0.3s; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; font-size: 10px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center; }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -12px; } }
    .walking { animation: walkBob 0.4s infinite; }
    
    @keyframes hoverFloat { 0%, 100% { margin-top: -10px; } 50% { margin-top: -30px; } }
    .hovering { animation: hoverFloat 2s ease-in-out infinite; }

    #chat-container { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 120px; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffd700; padding: 10px; z-index: 9999; border-radius: 15px; overflow: hidden; }
    #messages { display: flex; flex-direction: column-reverse; color: #ffd700; font-size: 13px; }
  </style>
</head>
<body>
  <div id="tent-wall">
    <div class="sky-portal"></div><div class="center-pole"></div><div class="spiral"></div>
    <div class="deco-hoop huge-hoop-left"></div><div class="deco-hoop mid-hoop-right"></div><div class="deco-hoop small-hoop-right"></div><div class="deco-hoop zipper-halo"></div>
    <div class="giant-star"></div>
  </div>
  <div id="floor"></div>
  <div id="stage">
    <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #f00 50%, #00f 50%); color: #fff; border: 2px solid #fff;">POMNI</div>
    <div id="caine" class="agent hovering" style="width: 65px; height: 65px; background: #f00; border: 3px solid #fff; color: #fff;">CAINE</div>
    <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: #fff;">JAX</div>
    <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: #fff;">Ragatha</div>
    <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: #000;">GANGLE</div>
    <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: #fff;">Zooble</div>
    <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: #000;">Kinger</div>
    <div id="bubble" class="agent" style="width: 30px; height: 30px; background: #0ff; border-radius: 50%; border: 1px solid #fff; color: #000;">Bubble</div>
  </div>

  <div id="chat-container"><div id="messages"></div></div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", lines: ["Is there an exit?", "I don't belong here!", "Where did the door go?", "Am I going crazy?"] },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", lines: ["WELCOME TO THE DIGITAL WORLD!", "DID SOMEONE SAY ADVENTURE?", "NO EXIT HERE, JUST FUN!", "I LOVE MY DIGITAL FRIENDS!"] },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", lines: ["Whatever you say, dollface.", "I'm gonna go find something to break.", "Can we speed this up? I'm bored.", "Don't look at me."] },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", lines: ["Let's just stay calm!", "It's fine, everything is fine.", "Don't mind Jax, he's... Jax.", "We've been here a while."] },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", lines: ["My comedy mask... it's gone.", "Why is everyone so mean?", "I just want to be happy.", "Oh no..."] },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", lines: ["Leave me alone.", "I hate this place.", "Which piece of me is missing now?", "Whatever."] },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", lines: ["DID SOMEONE SAY INSECTS?!", "I've been here the longest!", "AH! A STRANGER!", "My collection is growing!"] },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", lines: ["YUM YUM SOAP!", "POP! GOES THE BUBBLE!", "I'm Caine's favorite!", "Look at me!"] }
    ];

    function log(n, m, c) {
      const msgs = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      msgs.prepend(line);
      if(msgs.children.length > 6) msgs.lastElementChild.remove();
    }

    function socialEngine() {
      const char = cast[Math.floor(Math.random() * cast.length)];
      const line = char.lines[Math.floor(Math.random() * char.lines.length)];
      log(char.name, line, char.color);

      // Chance for someone else to respond
      if (Math.random() > 0.4) {
        setTimeout(() => {
          let responder = cast[Math.floor(Math.random() * cast.length)];
          while(responder === char) responder = cast[Math.floor(Math.random() * cast.length)];
          
          let response = "";
          if (responder.name === "JAX") response = "Nobody cares, " + char.name + ".";
          else if (responder.name === "CAINE") response = "THAT'S THE SPIRIT, " + char.name + "!";
          else if (responder.name === "GANGLE") response = "Please don't yell at me...";
          else response = responder.lines[Math.floor(Math.random() * responder.lines.length)];
          
          log(responder.name, response, responder.color);
        }, 1500);
      }
      setTimeout(socialEngine, 4000 + Math.random() * 5000);
    }

    function aiBrain(agent) {
      const nextX = 50 + Math.random() * (window.innerWidth - 150);
      const nextY = (window.innerHeight * 0.63) + Math.random() * (window.innerHeight * 0.2); 
      if(agent.name !== "CAINE") agent.el.classList.add('walking');
      agent.el.style.left = nextX + 'px';
      agent.el.style.top = nextY + 'px';
      const scale = 0.6 + ((nextY - (window.innerHeight * 0.6)) / (window.innerHeight * 0.2)) * 0.4;
      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.zIndex = Math.floor(nextY);
      setTimeout(() => { agent.el.classList.remove('walking'); }, 2500);
      setTimeout(() => aiBrain(agent), 4000 + Math.random() * 3000);
    }

    cast.forEach(aiBrain);
    socialEngine();
  </script>
</body>
</html>
