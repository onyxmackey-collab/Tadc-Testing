<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    
    /* PERSPECTIVE FIX: Set on a container to keep everything aligned */
    #circus-container {
      position: relative; width: 100%; height: 100%; perspective: 1000px;
    }

    #tent-wall {
      position: absolute; top: 0; left: 0; width: 100%; height: 60%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 8px solid #000; z-index: 1; overflow: hidden;
    }

    .center-pole { position: absolute; left: 50%; top: 0; width: 12px; height: 100%; background: #222; transform: translateX(-50%); }
    .spiral { position: absolute; left: 50%; width: 50px; height: 100%; background: repeating-linear-gradient(transparent, transparent 20px, #f00 20px, #f00 40px); transform: translateX(-50%) skewY(-15deg); opacity: 0.7; }

    /* DECORATIONS - LOCKED STATIC */
    .deco-hoop { position: absolute; border: 15px solid #0f0; border-radius: 50%; z-index: 2; }
    .huge-hoop-left { left: 5%; top: 38%; width: 180px; height: 180px; border-width: 22px; }
    .mid-hoop-right { right: 18%; top: 22%; width: 70px; height: 70px; border-width: 12px; }
    .small-hoop-right { right: 10%; top: 50%; width: 50px; height: 50px; border-width: 10px; }
    .zipper-halo { left: 50%; top: 30%; width: 120px; height: 35px; border-width: 10px; transform: translateX(-50%) rotateX(75deg); }
    .giant-star { position: absolute; top: 100px; right: 15%; width: 85px; height: 85px; background: #ff0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); border: 5px solid #000; z-index: 2;}
    .sky-portal { position: absolute; width: 130px; height: 130px; background: radial-gradient(circle, #fff, #87ceeb); border-radius: 50%; top: 35px; left: 8%; border: 8px solid #4a148c; z-index: 2;}

    /* FLOOR FIX: Adjusted rotation and origin for a flat look */
    #floor { 
      position: absolute; width: 200%; height: 100%; bottom: 0; left: -50%;
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 100px 100px; 
      transform: rotateX(60deg); 
      transform-origin: bottom center;
      box-shadow: inset 0 200px 100px rgba(0,0,0,0.8); 
      z-index: 0; 
    }

    /* AGENTS */
    #stage { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 10; }
    .agent { position: absolute; transition: all 2.5s ease-in-out; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; font-size: 10px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center; }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -15px; } }
    .walking { animation: walkBob 0.4s infinite; }
    
    @keyframes hoverFloat { 0%, 100% { transform: translateY(-5px); } 50% { transform: translateY(-25px); } }
    .hovering-anim { animation: hoverFloat 2s ease-in-out infinite; }

    #chat-container { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 120px; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffd700; padding: 10px; z-index: 9999; border-radius: 15px; overflow: hidden; }
    #messages { display: flex; flex-direction: column-reverse; color: #ffd700; font-size: 13px; }
  </style>
</head>
<body>
  <div id="circus-container">
    <div id="tent-wall">
      <div class="sky-portal"></div><div class="center-pole"></div><div class="spiral"></div>
      <div class="deco-hoop huge-hoop-left"></div><div class="deco-hoop mid-hoop-right"></div><div class="deco-hoop small-hoop-right"></div><div class="deco-hoop zipper-halo"></div>
      <div class="giant-star"></div>
    </div>
    <div id="floor"></div>
    <div id="stage">
      <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #f00 50%, #00f 50%); color: #fff; border: 2px solid #fff;">POMNI</div>
      <div id="caine" class="agent" style="width: 65px; height: 65px; background: #f00; border: 3px solid #fff; color: #fff;"><div class="hovering-anim">CAINE</div></div>
      <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: #fff;">JAX</div>
      <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: #fff;">Ragatha</div>
      <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: #000;">GANGLE</div>
      <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: #fff;">Zooble</div>
      <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: #000;">Kinger</div>
      <div id="bubble" class="agent" style="width: 30px; height: 30px; background: #0ff; border-radius: 50%; border: 1px solid #fff; color: #000;">Bubble</div>
    </div>
  </div>

  <div id="chat-container"><div id="messages"></div></div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", lines: ["Is there an exit?", "I don't belong here!", "Where did the door go?"] },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", lines: ["WELCOME!", "ADVENTURE AWAITS!", "NO EXIT, JUST FUN!"] },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", lines: ["Whatever, dollface.", "I'm bored.", "Don't look at me."] },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", lines: ["Stay calm!", "Everything is fine.", "Don't mind Jax."] },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", lines: ["My mask...", "Why so mean?", "I'm sad."] },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", lines: ["Leave me alone.", "I hate this.", "Whatever."] },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", lines: ["INSECTS?!", "AH! A STRANGER!", "My collection!"] },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", lines: ["YUM SOAP!", "POP!", "Look at me!"] }
    ];

    function log(n, m, c) {
      const msgs = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      msgs.prepend(line);
      if(msgs.children.length > 5) msgs.lastElementChild.remove();
    }

    function socialEngine() {
      const char = cast[Math.floor(Math.random() * cast.length)];
      log(char.name, char.lines[Math.floor(Math.random() * char.lines.length)], char.color);
      setTimeout(socialEngine, 5000 + Math.random() * 5000);
    }

    function aiBrain(agent) {
      // COORDINATE FIX: Restricted move area to the floor
      const nextX = 50 + Math.random() * (window.innerWidth - 150);
      const nextY = (window.innerHeight * 0.55) + Math.random() * (window.innerHeight * 0.35); 
      
      if(agent.name !== "CAINE") agent.el.classList.add('walking');
      agent.el.style.left = nextX + 'px';
      agent.el.style.top = nextY + 'px';
      
      // Scaling for depth
      const scale = 0.5 + ((nextY / window.innerHeight) * 0.5);
      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.zIndex = Math.floor(nextY);

      setTimeout(() => { agent.el.classList.remove('walking'); }, 2500);
      setTimeout(() => aiBrain(agent), 4000 + Math.random() * 3000);
    }

    cast.forEach(aiBrain);
    socialEngine();
  </script>
</body>
</html>
