<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    #circus-container { position: relative; width: 100%; height: 100%; overflow: hidden; }

    #tent-wall {
      position: absolute; top: 0; left: 0; width: 100%; height: 60%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 10px solid #000; z-index: 10; overflow: hidden;
    }

    .center-pole { position: absolute; left: 50%; top: 0; width: 12px; height: 100%; background: #222; transform: translateX(-50%); }
    .spiral { position: absolute; left: 50%; width: 50px; height: 100%; background: repeating-linear-gradient(transparent, transparent 20px, #f00 20px, #f00 40px); transform: translateX(-50%) skewY(-15deg); opacity: 0.7; }
    
    /* PROPS FIX: High Z-Index and clear positioning */
    #fort { position: absolute; right: 12%; top: 62%; width: 150px; height: 100px; z-index: 999; pointer-events: none; }
    .pillow { position: absolute; background: #eee; border: 3px solid #ccc; border-radius: 10px; box-shadow: 2px 5px 10px rgba(0,0,0,0.5); }
    
    #zooble-box { position: absolute; left: 8%; top: 75%; width: 90px; height: 60px; background: #8B4513; border: 4px solid #4A2500; z-index: 999; box-shadow: 0 10px 20px rgba(0,0,0,0.7); }
    #zooble-box::after { content: 'ZOOBLE PARTS'; position: absolute; top: -20px; left: 0; color: #fff; font-size: 10px; font-weight: bold; width: 100px; }

    #floor { 
      position: absolute; width: 150%; height: 100%; top: 59%; left: -25%;
      background-color: #fff;
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 80px 80px; transform: perspective(800px) rotateX(70deg); transform-origin: top center; z-index: 5;
    }

    /* AGENTS FIX: High Z-index and restricted movement */
    .agent { 
      position: absolute; 
      transition: left 2.5s ease-in-out, top 2.5s ease-in-out; /* Removed transform from transition to stop glitching */
      display: flex; align-items: center; justify-content: center; 
      font-weight: bold; border-radius: 5px; font-size: 10px; text-align: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center; 
      z-index: 2000;
    }

    #bubble { 
      background: radial-gradient(circle at 30% 30%, white, rgba(255,255,255,0.2) 20%, rgba(0,255,255,0.4) 60%, rgba(0,255,255,0.8));
      border: 1px solid white; box-shadow: inset -5px -5px 10px rgba(255,255,255,0.5), 0 0 15px cyan;
      transition: left 1s linear, top 1s linear; 
    }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -15px; } }
    .walking { animation: walkBob 0.4s infinite; }
    
    @keyframes hoverFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    .hovering-wrap { animation: hoverFloat 2s ease-in-out infinite; }

    #chat-container { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 120px; background: rgba(0, 0, 0, 0.95); border: 3px solid #ffd700; padding: 10px; z-index: 9999; border-radius: 15px; overflow: hidden; pointer-events: none; }
    #messages { display: flex; flex-direction: column-reverse; color: #ffd700; font-size: 13px; }
  </style>
</head>
<body>
  <div id="circus-container">
    <div id="tent-wall">
      <div class="center-pole"></div><div class="spiral"></div>
      <div style="position: absolute; width: 130px; height: 130px; background: radial-gradient(circle, #fff, #87ceeb); border-radius: 50%; top: 35px; left: 8%; border: 8px solid #4a148c; z-index: 11;"></div>
    </div>

    <!-- PROPS -->
    <div id="fort">
      <div class="pillow" style="width: 70px; height: 45px; bottom: 0; left: 0; background: #fff;"></div>
      <div class="pillow" style="width: 70px; height: 45px; bottom: 0; left: 80px; background: #ddd;"></div>
      <div class="pillow" style="width: 90px; height: 50px; bottom: 40px; left: 40px; background: #eee;"></div>
    </div>
    
    <div id="zooble-box"></div>

    <div id="floor"></div>
    <div id="stage">
      <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #f00 50%, #00f 50%); color: #fff; border: 2px solid #fff;">POMNI</div>
      <div id="caine" class="agent" style="width: 65px; height: 65px; background: #f00; border: 3px solid #fff; color: #fff;"><div class="hovering-wrap">CAINE</div></div>
      <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: #fff;">JAX</div>
      <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: #fff;">Ragatha</div>
      <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: #000;">GANGLE</div>
      <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: #fff;">Zooble</div>
      <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: #000;">Kinger</div>
      <div id="bubble" class="agent" style="width: 30px; height: 30px; border-radius: 50%; color: #000;">Bubble</div>
    </div>
  </div>
  <div id="chat-container"><div id="messages"></div></div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", lines: ["Is there an exit?", "I need to get out!"] },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", lines: ["WELCOME!", "WHAT A MARVELOUS DAY!"] },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", lines: ["Hope you're ready for drama.", "Heh."] },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", lines: ["Just keep smiling!", "We're okay!"] },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", lines: ["*sigh*", "Why did I wake up?"] },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", lines: ["Don't talk to me.", "Ugh."] },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", lines: ["IS IT SAFE?!", "I'M IN MY FORT!"] },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", lines: ["YUM SOAP!", "CAINE!"] }
    ];

    function log(n, m, c) {
      const msgs = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      msgs.prepend(line);
      if(msgs.children.length > 5) msgs.lastElementChild.remove();
    }

    function socialEngine() {
      const char = cast[Math.floor(Math.random() * cast.length)];
      log(char.name, char.lines[Math.floor(Math.random() * char.lines.length)], char.color);
      setTimeout(socialEngine, 5000 + Math.random() * 5000);
    }

    let cainePos = { x: 100, y: window.innerHeight * 0.75 };

    function aiBrain(agent) {
      if (agent.name === "Bubble") {
        const nextX = cainePos.x - 50;
        const nextY = cainePos.y - 15;
        agent.el.style.left = nextX + 'px';
        agent.el.style.top = nextY + 'px';
        setTimeout(() => aiBrain(agent), 1000);
        return;
      }

      // STRICTER SAFE BOUNDARY: No walking near the wall edge
      const nextX = 150 + Math.random() * (window.innerWidth - 300);
      const nextY = (window.innerHeight * 0.70) + Math.random() * (window.innerHeight * 0.15); 
      
      if (agent.name === "CAINE") {
        cainePos = { x: nextX, y: nextY };
      } else {
        agent.el.classList.add('walking');
      }

      // Instant scale update to prevent flicker
      const scale = 0.8 + ((nextY / window.innerHeight) * 0.2);
      agent.el.style.transform = `scale(${scale})`;
      
      agent.el.style.left = nextX + 'px';
      agent.el.style.top = nextY + 'px';

      setTimeout(() => { agent.el.classList.remove('walking'); }, 2500);
      setTimeout(() => aiBrain(agent), 4000 + Math.random() * 3000);
    }

    cast.forEach(aiBrain);
    socialEngine();
  </script>
</body>
</html>
