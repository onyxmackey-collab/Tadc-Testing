<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    body { font-family: 'Courier New', monospace; perspective: 1200px; }
    
    /* THE TENT WALL */
    #tent-wall {
      position: absolute; top: 0; left: 0; width: 100%; height: 65%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 8px solid #000; z-index: -10; overflow: hidden;
    }

    /* THE ZIPPER */
    .center-pole { position: absolute; left: 50%; top: 0; width: 12px; height: 100%; background: #222; transform: translateX(-50%); }
    .spiral { position: absolute; left: 50%; width: 50px; height: 100%; background: repeating-linear-gradient(transparent, transparent 20px, #f00 20px, #f00 40px); transform: translateX(-50%) skewY(-15deg); opacity: 0.7; }

    /* SPIRAL TUBES LEADING TO FLOOR */
    .spiral-tube {
      position: absolute; bottom: -20px; width: 60px; height: 300px;
      background: repeating-linear-gradient(0deg, #ff0, #ff0 20px, #00f 20px, #00f 40px);
      border: 4px solid #000; border-radius: 30px;
      transform: rotate(15deg) skewX(-10deg); z-index: -5;
    }

    /* RAINBOWS */
    .rainbow {
      position: absolute; bottom: 0; width: 140px; height: 70px;
      border-radius: 140px 140px 0 0;
      background: radial-gradient(circle at 50% 100%, transparent 20px, #f00 20px 30px, #ff0 30px 40px, #0f0 40px 50px, #00f 50px 60px);
      border-bottom: none; z-index: -4;
    }

    /* STATIONARY DECORATIONS */
    .giant-star {
      position: absolute; top: 100px; right: 15%; width: 90px; height: 90px;
      background: #ff0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      border: 5px solid #000; z-index: -3;
    }

    .sky-portal {
      position: absolute; width: 140px; height: 140px; background: skyblue; 
      border-radius: 50%; top: 40px; left: 8%; border: 8px solid #4a148c;
      background: radial-gradient(circle, #fff, #87ceeb);
    }

    /* THE FLOOR */
    #floor { 
      position: absolute; width: 400%; height: 150vh; bottom: -10vh; left: -150%;
      background-color: #fff; 
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 100px 100px; transform: rotateX(72deg); transform-origin: bottom center;
      box-shadow: inset 0 0 200px rgba(0,0,0,1); z-index: -1; 
    }

    .agent { 
      position: absolute; transition: left 2s ease-in-out, top 2s ease-in-out, transform 0.3s; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: bold; border-radius: 5px; font-size: 10px; text-align: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center;
    }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -12px; } }
    .walking { animation: walkBob 0.4s infinite; }

    #chat-container { 
      position: fixed; bottom: 15px; left: 15px; right: 15px; height: 110px; 
      background: rgba(0, 0, 0, 0.95); border: 3px solid #ffd700; padding: 10px; 
      font-size: 13px; z-index: 9999; color: #ffd700; overflow: hidden; border-radius: 15px;
    }
    #messages { display: flex; flex-direction: column-reverse; }
  </style>
</head>
<body>
  <div id="tent-wall">
    <div class="sky-portal"></div>
    <div class="center-pole"></div>
    <div class="spiral"></div>
    
    <!-- Spiral Tubes leading down to the floor -->
    <div class="spiral-tube" style="left: 2%;"></div>
    <div class="spiral-tube" style="right: 2%; transform: rotate(-15deg) skewX(10deg);"></div>

    <!-- Rainbows in the empty spaces -->
    <div class="rainbow" style="left: 25%;"></div>
    <div class="rainbow" style="right: 25%;"></div>

    <div class="giant-star"></div>
    
    <div class="pipe" style="position: absolute; top: 120px; left: 35%; width: 300px; height: 35px; background: linear-gradient(90deg, #f00, #ff0, #00f, #0f0); border: 4px solid #000; border-radius: 20px; transform: rotate(-5deg); z-index: -2;"></div>
  </div>

  <div id="floor"></div>
  
  <div id="stage">
    <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #f00 50%, #00f 50%); color: #fff; border: 2px solid #fff;">POMNI</div>
    <div id="caine" class="agent" style="width: 65px; height: 65px; background: #f00; border: 3px solid #fff; color: #fff;">CAINE</div>
    <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: #fff;">JAX</div>
    <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: #fff;">Ragatha</div>
    <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: #000;">GANGLE</div>
    <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: #fff;">Zooble</div>
    <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: #000;">Kinger</div>
    <div id="bubble" class="agent" style="width: 30px; height: 30px; background: #0ff; border-radius: 50%; border: 1px solid #fff; color: #000;">Bubble</div>
  </div>

  <div id="chat-container">
    <div id="messages"><div>[SYSTEM]: Set architecture finalized. Do not attempt to climb the tubes.</div></div>
  </div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d" },
      { el: document.getElementById('caine'), name: "CAINE", color: "red" },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff" },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d" },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", mood: "Happy" },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500" },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700" },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan" }
    ];

    function log(n, m, c) {
      const chat = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      chat.appendChild(line);
      if(chat.children.length > 5) chat.firstElementChild.remove();
    }

    function aiBrain(agent) {
      const nextX = 50 + Math.random() * (window.innerWidth - 150);
      const nextY = (window.innerHeight * 0.62) + Math.random() * (window.innerHeight * 0.22); 
      
      agent.el.classList.add('walking');
      agent.el.style.left = nextX + 'px';
      agent.el.style.top = nextY + 'px';
      
      const scale = 0.6 + ((nextY - (window.innerHeight * 0.6)) / (window.innerHeight * 0.2)) * 0.4;
      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.zIndex = Math.floor(nextY);

      if (Math.random() > 0.9) {
          const lines = ["Look at the rainbows!", "I like the spiral tubes.", "This floor is dizzying.", "Everything is so colorful!"];
          log(agent.name, lines[Math.floor(Math.random()*lines.length)], agent.color);
      }

      setTimeout(() => { agent.el.classList.remove('walking'); }, 2000);
      setTimeout(() => aiBrain(agent), 3000 + Math.random() * 4000);
    }
    cast.forEach(aiBrain);
  </script>
</body>
</html>
