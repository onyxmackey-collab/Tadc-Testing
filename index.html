<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    body { font-family: 'Courier New', monospace; perspective: 1200px; }
    
    /* THE TENT WALL */
    #tent-wall {
      position: absolute; top: 0; left: 0; width: 100%; height: 65%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 10px solid #000; z-index: -10; overflow: hidden;
    }

    .sky-portal {
      position: absolute; width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle, #fff, #87ceeb); border: 8px solid #4a148c; 
      top: 20px; left: 10%; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .pipe {
      position: absolute; height: 35px; width: 450px; border-radius: 20px;
      background: repeating-linear-gradient(90deg, #f00 0, #f00 40px, #0f0 40px, #0f0 80px, #00f 80px, #00f 120px, #ff0 120px, #ff0 160px);
      border: 4px solid #000; box-shadow: 5px 5px 0 rgba(0,0,0,0.2);
    }

    /* BLOCKS MOVED UP TO REST ON THE FLOOR LINE */
    .block-tower {
      position: absolute; bottom: 0; width: 120px; height: 260px;
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr);
      gap: 2px; border: 5px solid #000; background: #000; z-index: -5;
    }
    .block-piece { border: 2px solid rgba(255,255,255,0.2); }

    /* NEW: Floating Gloink Ring and Spheres */
    .floating-ring {
      position: absolute; top: 40px; right: 25%; width: 70px; height: 70px;
      border: 15px solid #ccc; border-radius: 50%; box-shadow: 10px 10px 0 rgba(0,0,0,0.2);
    }
    .toy-sphere {
      position: absolute; border-radius: 50%; border: 3px solid #000;
    }

    .rainbow-arch {
      position: absolute; bottom: -5px; width: 110px; height: 55px;
      border-radius: 100px 100px 0 0; border: 8px solid #f00;
      box-shadow: 0 0 0 8px #ff0, 0 0 0 16px #0f0, 0 0 0 24px #00f;
      z-index: -4;
    }

    .center-pole {
      position: absolute; left: 50%; top: 0; width: 12px; height: 100%;
      background: #222; transform: translateX(-50%);
    }
    .spiral {
      position: absolute; left: 50%; width: 50px; height: 100%;
      background: repeating-linear-gradient(transparent, transparent 20px, #f00 20px, #f00 40px);
      transform: translateX(-50%) skewY(-15deg); opacity: 0.6;
    }

    #floor { 
      position: absolute; width: 400%; height: 150vh; bottom: -10vh; left: -150%;
      background-color: #fff; 
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 100px 100px; transform: rotateX(72deg); transform-origin: bottom center;
      box-shadow: inset 0 0 200px rgba(0,0,0,1); z-index: -1; 
    }

    .agent { 
      position: absolute; transition: left 2s ease-in-out, top 2s ease-in-out, transform 0.3s; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: bold; border-radius: 5px; font-size: 10px; text-align: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center;
    }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -12px; } }
    .walking { animation: walkBob 0.4s infinite; }

    #chat-container { 
      position: fixed; bottom: 15px; left: 15px; right: 15px; height: 110px; 
      background: rgba(0, 0, 0, 0.95); border: 3px solid #ffd700; 
      padding: 10px; font-size: 13px; z-index: 9999; color: #ffd700; 
      overflow: hidden; border-radius: 15px;
    }
    #messages { display: flex; flex-direction: column-reverse; }
  </style>
</head>
<body>
  <div id="tent-wall">
    <div class="sky-portal"></div>
    <div class="center-pole"></div>
    <div class="spiral"></div>
    
    <div class="pipe" style="top: 100px; left: 35%; transform: rotate(-5deg);"></div>
    <div class="pipe" style="top: 220px; left: 5%; transform: rotate(8deg); width: 350px;"></div>
    
    <!-- Left Tower -->
    <div class="block-tower" style="left: 0;">
        <div class="block-piece" style="background: #00f;"></div><div class="block-piece" style="background: #f0f;"></div>
        <div class="block-piece" style="background: #0f0;"></div><div class="block-piece" style="background: #f00;"></div>
        <div class="block-piece" style="background: #ff0;"></div><div class="block-piece" style="background: #00f;"></div>
        <div class="block-piece" style="background: #f00;"></div><div class="block-piece" style="background: #0f0;"></div>
    </div>

    <!-- Right Tower -->
    <div class="block-tower" style="right: 0;">
        <div class="block-piece" style="background: #f00;"></div><div class="block-piece" style="background: #0f0;"></div>
        <div class="block-piece" style="background: #00f;"></div><div class="block-piece" style="background: #ff0;"></div>
        <div class="block-piece" style="background: #0f0;"></div><div class="block-piece" style="background: #f00;"></div>
        <div class="block-piece" style="background: #ff0;"></div><div class="block-piece" style="background: #00f;"></div>
    </div>

    <!-- Empty Space Fillers -->
    <div class="floating-ring"></div>
    <div class="toy-sphere" style="width: 40px; height: 40px; background: #00f; bottom: 80px; left: 25%;"></div>
    <div class="toy-sphere" style="width: 60px; height: 60px; background: #f00; bottom: 20px; right: 20%; z-index: -3;"></div>

    <div class="rainbow-arch" style="left: 15%;"></div>
    <div class="rainbow-arch" style="left: 45%;"></div>
    <div class="rainbow-arch" style="left: 75%;"></div>
  </div>

  <div id="floor"></div>
  
  <div id="stage">
    <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #ff0000 50%, #0000ff 50%); color: white; border: 2px solid white;">POMNI</div>
    <div id="caine" class="agent" style="width: 65px; height: 65px; background: #ff0000; border: 3px solid white; color: white;">CAINE</div>
    <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: white;">JAX</div>
    <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: white;">Ragatha</div>
    <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: black;">GANGLE</div>
    <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: white;">Zooble</div>
    <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: black;">Kinger</div>
    <div id="bubble" class="agent" style="width: 30px; height: 30px; background: #00ffff; border-radius: 50%; border: 1px solid white; color: black;">Bubble</div>
  </div>

  <div id="chat-container">
    <div id="messages"><div>[SYSTEM]: Set stabilized. Enjoy the performance.</div></div>
  </div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", x: 150, y: 150 },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", x: 100, y: 100 },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", x: 200, y: 200 },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", x: 300, y: 300 },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", x: 150, y: 150, mood: "Happy" },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", x: 50, y: 50 },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", x: 400, y: 400 },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", x: 250, y: 250 }
    ];

    function log(n, m, c) {
      const chat = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      chat.appendChild(line);
      if(chat.children.length > 5) chat.firstElementChild.remove();
    }

    function aiBrain(agent) {
      const nextX = 50 + Math.random() * (window.innerWidth - 150);
      const nextY = (window.innerHeight * 0.6) + Math.random() * (window.innerHeight * 0.2); 
      
      agent.el.classList.add('walking');
      agent.x = nextX; agent.y = nextY;
      agent.el.style.left = nextX + 'px';
      agent.el.style.top = nextY + 'px';
      
      const scale = 0.6 + ((nextY - (window.innerHeight * 0.6)) / (window.innerHeight * 0.2)) * 0.4;
      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.zIndex = Math.floor(nextY);

      setTimeout(() => { agent.el.classList.remove('walking'); }, 2000);

      if (Math.random() > 0.9) {
          const lines = ["I wonder what's behind the wall.", "Don't fall into the void!", "I like the new blocks.", "Is Caine watching us?"];
          log(agent.name, lines[Math.floor(Math.random()*lines.length)], agent.color);
      }

      if (agent.name === "JAX") {
        const g = cast.find(a => a.name === "Gangle");
        if (Math.hypot(agent.x - g.x, agent.y - g.y) < 80 && g.mood === "Happy") {
          g.mood = "Sad"; g.el.style.background = "#333"; g.el.style.color = "white"; g.el.innerHTML = "GANGLE :(";
          log("JAX", "Oops, my hand slipped.", "#d1a3ff");
        }
      }

      if (agent.name === "CAINE") {
        const g = cast.find(a => a.name === "Gangle");
        if (g.mood === "Sad") {
          g.mood = "Happy"; g.el.style.background = "pink"; g.el.style.color = "black"; g.el.innerHTML = "GANGLE";
          log("CAINE", "NO SADNESS!", "red");
        }
      }

      setTimeout(() => aiBrain(agent), 3000 + Math.random() * 4000);
    }
    cast.forEach(aiBrain);
  </script>
</body>
</html>
