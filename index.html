<!DOCTYPE html>
<html>
<body style="background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden;">

  <!-- THE OVERLORD -->
  <div id="caine" style="width: 100px; height: 100px; background: red; position: absolute; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px red; z-index: 10;">
    CAINE
  </div>

  <!-- THE SUBORDINATE -->
  <div id="bubble" style="width: 50px; height: 50px; background: cyan; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; color: black; font-size: 10px; z-index: 5;">
    Bubble
  </div>

  <script>
    const caine = document.getElementById('caine');
    const bubble = document.getElementById('bubble');

    const handleMove = (e) => {
      const x = e.touches ? e.touches[0].pageX : e.pageX;
      const y = e.touches ? e.touches[0].pageY : e.pageY;

      // Bubble follows your finger
      bubble.style.left = (x - 25) + 'px';
      bubble.style.top = (y - 25) + 'px';

      // POWER LOGIC: Caine "glitches" toward Bubble
      if (Math.random() > 0.90) {
        caine.style.left = (x - 50 + (Math.random() * 40 - 20)) + 'px';
        caine.style.top = (y - 50 + (Math.random() * 40 - 20)) + 'px';
        
        // Caine takes control of Bubble's color
        bubble.style.background = 'red';
        setTimeout(() => { bubble.style.background = 'cyan'; }, 300);
      }
    };

    document.addEventListener('mousemove', handleMove);
    document.addEventListener('touchmove', handleMove);
  </script>
</body>
</html>
