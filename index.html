<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    #circus-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* TOP LAYER: THE WALL */
    #tent-wall {
      position: relative; width: 100%; height: 60%; 
      background: repeating-linear-gradient(90deg, #e61d2b, #e61d2b 60px, #ffdf00 60px, #ffdf00 120px);
      border-bottom: 10px solid #000; z-index: 10;
    }

    .center-pole { position: absolute; left: 50%; top: 0; width: 12px; height: 100%; background: #222; transform: translateX(-50%); }
    .spiral { position: absolute; left: 50%; width: 50px; height: 100%; background: repeating-linear-gradient(transparent, transparent 20px, #f00 20px, #f00 40px); transform: translateX(-50%) skewY(-15deg); opacity: 0.7; }
    .deco-hoop { position: absolute; border: 15px solid #0f0; border-radius: 50%; z-index: 11; }
    .huge-hoop-left { left: 5%; top: 38%; width: 180px; height: 180px; border-width: 22px; }
    .mid-hoop-right { right: 18%; top: 22%; width: 70px; height: 70px; border-width: 12px; }
    .small-hoop-right { right: 10%; top: 50%; width: 50px; height: 50px; border-width: 10px; }
    .giant-star { position: absolute; top: 100px; right: 15%; width: 85px; height: 85px; background: #ff0; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); border: 5px solid #000; z-index: 11;}
    .sky-portal { position: absolute; width: 130px; height: 130px; background: radial-gradient(circle, #fff, #87ceeb); border-radius: 50%; top: 35px; left: 8%; border: 8px solid #4a148c; z-index: 11;}

    /* BOTTOM LAYER: THE FLOOR */
    #floor-wrapper { position: absolute; bottom: 0; width: 100%; height: 40%; perspective: 800px; z-index: 1; }
    #floor { 
      position: absolute; width: 200%; height: 500px; top: 0; left: -50%;
      background-color: #fff;
      background-image: conic-gradient(#000 90deg, transparent 90deg 180deg, #000 180deg 270deg, transparent 270deg);
      background-size: 100px 100px; transform: rotateX(70deg); transform-origin: top center;
    }

    /* PROPS & AGENTS LAYER */
    #stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
    
    #fort { position: absolute; right: 10%; bottom: 15%; width: 150px; height: 80px; }
    .pillow { position: absolute; background: #eee; border: 3px solid #ccc; border-radius: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    #zooble-box { position: absolute; left: 8%; bottom: 12%; width: 90px; height: 55px; background: #8B4513; border: 4px solid #4A2500; }

    .agent { 
      position: absolute; transition: left 2.5s ease-in-out, top 2.5s ease-in-out; 
      display: flex; align-items: center; justify-content: center; 
      font-weight: bold; border-radius: 5px; font-size: 10px; text-align: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.8); transform-origin: bottom center; 
    }

    #bubble { 
      background: radial-gradient(circle at 30% 30%, white, rgba(0,255,255,0.4) 60%, rgba(0,255,255,0.8));
      border: 1px solid white; border-radius: 50%; box-shadow: 0 0 15px cyan;
    }

    @keyframes walkBob { 0%, 100% { margin-top: 0px; } 50% { margin-top: -15px; } }
    .walking { animation: walkBob 0.4s infinite; }
    .hovering-wrap { animation: hoverFloat 2s ease-in-out infinite; }
    @keyframes hoverFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    #chat-container { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 100px; background: rgba(0, 0, 0, 0.9); border: 3px solid #ffd700; padding: 10px; z-index: 100; border-radius: 15px; overflow: hidden; }
    #messages { display: flex; flex-direction: column-reverse; color: #ffd700; font-size: 12px; }
  </style>
</head>
<body>
  <div id="circus-container">
    <div id="tent-wall">
      <div class="sky-portal"></div><div class="center-pole"></div><div class="spiral"></div>
      <div class="deco-hoop huge-hoop-left"></div><div class="deco-hoop mid-hoop-right"></div><div class="deco-hoop small-hoop-right"></div>
      <div class="giant-star"></div>
    </div>

    <div id="floor-wrapper"><div id="floor"></div></div>

    <div id="stage">
      <div id="fort">
        <div class="pillow" style="width: 70px; height: 40px; bottom: 0; left: 0; background: #fff;"></div>
        <div class="pillow" style="width: 70px; height: 40px; bottom: 0; left: 80px; background: #ddd;"></div>
        <div class="pillow" style="width: 90px; height: 45px; bottom: 35px; left: 40px; background: #eee;"></div>
      </div>
      <div id="zooble-box"></div>

      <div id="pomni" class="agent" style="width: 45px; height: 45px; background: linear-gradient(45deg, #f00 50%, #00f 50%); color: #fff; border: 2px solid #fff;">POMNI</div>
      <div id="caine" class="agent" style="width: 65px; height: 65px; background: #f00; border: 3px solid #fff; color: #fff;"><div class="hovering-wrap">CAINE</div></div>
      <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: #fff;">JAX</div>
      <div id="ragatha" class="agent" style="width: 50px; height: 50px; background: #b22222; border: 2px solid blue; color: #fff;">Ragatha</div>
      <div id="gangle" class="agent" style="width: 40px; height: 40px; background: pink; border-radius: 50%; color: #000;">GANGLE</div>
      <div id="zooble" class="agent" style="width: 45px; height: 45px; background: #ff4500; border: 3px dashed yellow; color: #fff;">Zooble</div>
      <div id="kinger" class="agent" style="width: 45px; height: 60px; background: #FFD700; border: 3px solid #8B4513; color: #000;">Kinger</div>
      <div id="bubble" class="agent" style="width: 30px; height: 30px; color: #000;">Bubble</div>
    </div>
  </div>
  <div id="chat-container"><div id="messages"></div></div>

  <script>
    const cast = [
      { el: document.getElementById('pomni'), name: "POMNI", color: "#ff4d4d", lines: ["I need to find a way out!", "Where's the door?"] },
      { el: document.getElementById('caine'), name: "CAINE", color: "red", lines: ["AREN'T WE HAVING FUN?", "WELCOME BACK!"] },
      { el: document.getElementById('jax'), name: "JAX", color: "#d1a3ff", lines: ["This is hilarious.", "Heh."] },
      { el: document.getElementById('ragatha'), name: "Ragatha", color: "#ff4d4d", lines: ["Just keep smiling...", "We're okay!"] },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", lines: ["My comedy mask...", "Aww."] },
      { el: document.getElementById('zooble'), name: "Zooble", color: "#ff4500", lines: ["Don't touch my box.", "Whatever."] },
      { el: document.getElementById('kinger'), name: "Kinger", color: "#FFD700", lines: ["I'M IN MY FORTRESS!", "INSECTS!"] },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", lines: ["YUM SOAP!", "POP!"] }
    ];

    function log(n, m, c) {
      const msgs = document.getElementById('messages');
      const line = document.createElement('div');
      line.innerHTML = `<span style="color:${c}; font-weight:bold;">[${n}]</span>: ${m}`;
      msgs.prepend(line);
      if(msgs.children.length > 4) msgs.lastElementChild.remove();
    }

    function socialEngine() {
      const char = cast[Math.floor(Math.random() * cast.length)];
      log(char.name, char.lines[Math.floor(Math.random() * char.lines.length)], char.color);
      setTimeout(socialEngine, 6000 + Math.random() * 4000);
    }

    let cainePos = { x: 100, y: window.innerHeight * 0.7 };

    function aiBrain(agent) {
      if (agent.name === "Bubble") {
        const nextX = cainePos.x - 50;
        const nextY = cainePos.y - 15;
        agent.el.style.left = nextX + 'px';
        agent.el.style.top = nextY + 'px';
        setTimeout(() => aiBrain(agent), 1000);
        return;
      }

      // SAFE AREA: Stay within 65% to 85% of height
      const nextX = 100 + Math.random() * (window.innerWidth - 250);
      const nextY = (window.innerHeight * 0.65) + Math.random() * (window.innerHeight * 0.20); 
      
      if (agent.name === "CAINE") { cainePos = { x: nextX, y: nextY }; }
      else { agent.el.classList.add('walking'); }

      const scale = 0.8 + ((nextY / window.innerHeight) * 0.2);
      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.left = nextX + 'px';
      agent.el.style.top = nextY + 'px';

      setTimeout(() => { agent.el.classList.remove('walking'); }, 2500);
      setTimeout(() => aiBrain(agent), 4000 + Math.random() * 3000);
    }

    cast.forEach(aiBrain);
    socialEngine();
  </script>
</body>
</html>
