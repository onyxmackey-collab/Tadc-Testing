<!DOCTYPE html>
<html>
<body id="world" style="background: #111; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: white; transition: background 3s;">

  <!-- THE CIRCUS CAST (With added 3D Scale) -->
  <div id="caine" style="width: 60px; height: 60px; background: red; position: absolute; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px red; z-index: 1000; transition: all 1s;">CAINE</div>
  <div id="bubble" style="width: 30px; height: 30px; background: cyan; border-radius: 50%; position: absolute; z-index: 500; transition: all 2s;"></div>
  <div id="jax" style="width: 40px; height: 40px; background: #a020f0; position: absolute; z-index: 600; transition: all 1.5s;">JAX</div>
  <div id="kinger" style="width: 35px; height: 50px; background: white; border: 3px solid purple; position: absolute; z-index: 400; transition: all 0.5s;">!</div>

  <div id="chat" style="position: fixed; bottom: 10px; left: 10px; right: 10px; height: 80px; background: rgba(0,0,0,0.9); border: 1px solid #444; padding: 10px; font-size: 10px; z-index: 2000; color: #0f0; overflow: hidden;">
    <div id="messages">System: Dimension & Sleep Cycles Loaded...</div>
  </div>

  <script>
    let isBedtime = false;
    const cast = [
      { el: document.getElementById('caine'), name: "CAINE", color: "red", power: 100 },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", power: 1 },
      { el: document.getElementById('jax'), name: "JAX", color: "#a020f0", power: 50 },
      { el: document.getElementById('kinger'), name: "Kinger", color: "white", power: 30 }
    ];

    function log(name, msg, color) {
      const line = document.createElement('div');
      line.innerHTML = `<b style="color:${color}">${name}:</b> ${msg}`;
      document.getElementById('messages').prepend(line);
    }

    // BEDTIME CYCLE
    setInterval(() => {
      isBedtime = !isBedtime;
      document.getElementById('world').style.background = isBedtime ? "#000022" : "#111";
      log("SYSTEM", isBedtime ? "CAINE: BEDTIME, EVERYONE!" : "CAINE: WAKE UP!", "red");
    }, 15000);

    function aiBrain(agent) {
      if (isBedtime && agent.name !== "CAINE") {
        setTimeout(() => aiBrain(agent), 2000);
        return; 
      }

      // DIMENSION: Randomly pick a "depth" (Z)
      const depth = Math.random(); // 0 is far away, 1 is close
      const scale = 0.5 + (depth * 1.5); // Shrink to 50% or grow to 150%
      
      const x = Math.random() * (window.innerWidth - 60);
      const y = Math.random() * (window.innerHeight - 200);

      agent.el.style.transform = `scale(${scale})`;
      agent.el.style.zIndex = Math.floor(depth * 1000);
      agent.el.style.left = x + 'px';
      agent.el.style.top = y + 'px';
      agent.el.style.opacity = 0.3 + (depth * 0.7); // Faded when far away

      // Building with dimension
      if (Math.random() > 0.6) {
        const b = document.createElement('div');
        b.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${10*scale}px; height:${10*scale}px; background:${agent.color}; z-index:${Math.floor(depth*900)}; opacity:0.4;`;
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 10000);
      }

      setTimeout(() => aiBrain(agent), 1500 + Math.random() * 3000);
    }

    cast.forEach(agent => aiBrain(agent));
  </script>
</body>
</html>
