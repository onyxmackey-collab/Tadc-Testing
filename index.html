<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; perspective: 1200px; }
    /* THE 3D FLOOR */
    #floor { 
      position: absolute; width: 200%; height: 200%; top: 45%; left: -50%;
      background-image: radial-gradient(circle, #444 1px, transparent 1px), linear-gradient(#111 2px, transparent 2px), linear-gradient(90deg, #111 2px, transparent 2px);
      background-size: 80px 80px; transform: rotateX(70deg); z-index: 1; opacity: 0.6;
    }
    #stage { position: relative; width: 100vw; height: 100vh; z-index: 10; transform-style: preserve-3d; }
    .agent { position: absolute; transition: all 1.8s ease-in-out; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; }
    #chat { position: fixed; bottom: 10px; left: 10px; right: 10px; height: 90px; background: rgba(0,0,0,0.95); border: 1px solid #555; padding: 10px; font-size: 11px; z-index: 2000; color: #0f0; overflow: hidden; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="floor"></div>
  <div id="stage">
    <div id="caine" class="agent" style="width: 65px; height: 65px; background: red; box-shadow: 0 0 25px red; color: white; z-index: 1000;">CAINE</div>
    <div id="jax" class="agent" style="width: 45px; height: 45px; background: #a020f0; color: white; z-index: 900;">JAX</div>
    <div id="gangle" class="agent" style="width: 35px; height: 35px; background: pink; border-radius: 50%; color: black; font-size: 10px; z-index: 800;">Happy</div>
    <div id="bubble" class="agent" style="width: 30px; height: 30px; background: cyan; border-radius: 50%; color: black; font-size: 8px; z-index: 700;">Bubble</div>
  </div>
  <div id="chat"><div id="messages">System: 3D Room, Jax, and Gangle Masks Active...</div></div>

  <script>
    const cast = [
      { el: document.getElementById('caine'), name: "CAINE", color: "red", mood: "Master" },
      { el: document.getElementById('jax'), name: "JAX", color: "#a020f0", mood: "Pranking" },
      { el: document.getElementById('gangle'), name: "Gangle", color: "pink", mood: "Happy" },
      { el: document.getElementById('bubble'), name: "Bubble", color: "cyan", mood: "Neutral" }
    ];

    function log(name, msg, color) {
      const line = document.createElement('div');
      line.innerHTML = `<b style="color:${color}">${name}:</b> ${msg}`;
      document.getElementById('messages').prepend(line);
    }

    function aiBrain(agent) {
      const x = Math.random() * (window.innerWidth - 70);
      const y = Math.random() * (window.innerHeight - 250);
      
      agent.x = x; agent.y = y;
      agent.el.style.left = x + 'px';
      agent.el.style.top = y + 'px';
      
      // 3D Perspective Scaling
      const scale = 0.4 + (y / window.innerHeight) * 1.2;
      agent.el.style.transform = `scale(${scale})`;

      // JAX PRANK LOGIC
      if (agent.name === "JAX") {
        const gangle = cast[2];
        const distToGangle = Math.hypot(x - gangle.x, y - gangle.y);
        if (distToGangle < 80 && gangle.mood === "Happy") {
          gangle.mood = "Sad";
          gangle.el.style.background = "#444";
          gangle.el.style.color = "white";
          gangle.el.innerHTML = "Sad";
          log("JAX", "Whoops! Dropped your mask, Gangle!", "#a020f0");
          log("Gangle", "My comedy mask... it's gone...", "gray");
        }
      }

      // CAINE ADMIN LOGIC (Fixing Gangle)
      if (agent.name === "CAINE") {
        const gangle = cast[2];
        const distToGangle = Math.hypot(x - gangle.x, y - gangle.y);
        if (distToGangle < 100 && gangle.mood === "Sad") {
          gangle.mood = "Happy";
          gangle.el.style.background = "pink";
          gangle.el.style.color = "black";
          gangle.el.innerHTML = "Happy";
          log("CAINE", "NO SADNESS IN THE CIRCUS! FIXED IT!", "red");
        }
      }

      // BUILDING
      if (agent.mood !== "Sad" && Math.random() > 0.4) {
        const b = document.createElement('div');
        b.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:12px; height:12px; background:${agent.el.style.background}; opacity:0.3; z-index:5; border-radius:2px;`;
        document.getElementById('stage').appendChild(b);
        setTimeout(() => b.remove(), 10000);
      }

      setTimeout(() => aiBrain(agent), 1500 + Math.random() * 2000);
    }

    cast.forEach(aiBrain);
  </script>
</body>
</html>
